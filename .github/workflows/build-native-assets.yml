name: Build Desktop Native Assets

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version used in artifact names and optional release tag
        required: true
        default: 1.2.0
        type: string
      publish_release:
        description: Publish assets to a GitHub Release
        required: true
        default: false
        type: boolean
  push:
    branches:
      - main
    tags:
      - desktop-binaries-v*
      - android-binaries-v*

run-name: >-
  Build native assets
  ${{
    github.event_name == 'workflow_dispatch'
      && format('(version {0})', inputs.version)
      || ''
  }}

jobs:
  build-desktop:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            os: windows-latest
            flutter-build-command: flutter build windows --release
            output-name: flutter_taglib_windows_x64.dll
            search-pattern: flutter_taglib_native.dll
          - platform: linux-x64
            os: ubuntu-22.04
            flutter-build-command: flutter build linux --release
            output-name: libflutter_taglib_linux_x64.so
            search-pattern: libflutter_taglib_native.so

    env:
      FLUTTER_TAGLIB_BUILD_DESKTOP_FROM_SOURCE: "true"
      FLUTTER_TAGLIB_RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev unzip

      - name: Flutter pub get
        run: flutter pub get

      - name: Enable desktop source build marker
        shell: bash
        run: |
          touch .flutter_taglib_build_desktop_from_source

      - name: Build desktop example
        working-directory: example
        run: ${{ matrix.flutter-build-command }}

      - name: Debug native asset outputs
        shell: bash
        run: |
          echo "Searching for native asset outputs..."
          find . -path '*native_assets*' | sort || true
          find . -name '*taglib*.so' -o -name '*taglib*.dll' | sort || true

      - name: Collect Windows asset
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $file = Get-ChildItem -Path example/build/windows/x64/runner/Release -Recurse -Filter "${{ matrix.search-pattern }}" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $file) {
            $file = Get-ChildItem -Path example/build/windows/x64 -Recurse -Filter "${{ matrix.search-pattern }}" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $file) {
            $file = Get-ChildItem -Path example/build/windows/x64 -Recurse -Include "*taglib*.dll" -File -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $file) { throw "Could not find ${{ matrix.search-pattern }}" }
          Copy-Item $file.FullName "dist/${{ matrix.output-name }}"

      - name: Debug Windows outputs
        if: runner.os == 'Windows' && failure()
        shell: pwsh
        run: |
          Write-Host "Listing candidate Windows outputs:"
          if (Test-Path example/build/windows/x64) {
            Get-ChildItem -Path example/build/windows/x64 -Recurse -Include *.dll -File -ErrorAction SilentlyContinue |
              Sort-Object FullName |
              ForEach-Object { $_.FullName }
          } else {
            Write-Host "example/build/windows/x64 does not exist"
          }

      - name: Collect Linux asset
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p dist
          file_path="$(find example/build/linux/x64/release/bundle/lib -name '${{ matrix.search-pattern }}' | head -n 1)"
          if [ -z "$file_path" ]; then
            file_path="$(find example/build/linux/x64/release -path '*native_assets*' -name '${{ matrix.search-pattern }}' | head -n 1)"
          fi
          if [ -z "$file_path" ]; then
            echo "Could not find ${{ matrix.search-pattern }}"
            echo "Listing candidate Linux outputs:"
            find example/build/linux/x64/release -maxdepth 8 \( -name '*.so' -o -path '*native_assets*' \) | sort
            exit 1
          fi
          cp "$file_path" "dist/${{ matrix.output-name }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}${{ github.event_name == 'workflow_dispatch' && format('-v{0}', inputs.version) || '' }}
          path: dist/${{ matrix.output-name }}

  build-android:
    name: Build Android
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Android APK
        working-directory: example
        run: flutter build apk --release

      - name: Debug Android outputs
        shell: bash
        run: |
          echo "Searching for Android native asset outputs..."
          find . -name 'libflutter_taglib_native.so' | sort || true

      - name: Collect Android assets
        shell: bash
        run: |
          mkdir -p dist
          find example/build/ -path '*/merged_native_libs/release/out/lib/*' -name 'libflutter_taglib_native.so' | while read -r file; do
            abi=$(basename "$(dirname "$file")")
            cp "$file" "dist/libflutter_taglib_android_${abi}.so"
            echo "Collected $abi binary: dist/libflutter_taglib_android_${abi}.so"
          done

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-binaries${{ github.event_name == 'workflow_dispatch' && format('-v{0}', inputs.version) || '' }}
          path: dist/libflutter_taglib_android_*.so

  publish-release:
    name: Publish Release Assets
    needs: [build-desktop, build-android]
    if: >-
      startsWith(github.ref, 'refs/tags/desktop-binaries-v') ||
      startsWith(github.ref, 'refs/tags/android-binaries-v') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    runs-on: ubuntu-22.04

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Determine release tag
        id: release_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=desktop-binaries-v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: ${{ steps.release_tag.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            dist/windows-x64${{ github.event_name == 'workflow_dispatch' && format('-v{0}', inputs.version) || '' }}/flutter_taglib_windows_x64.dll
            dist/linux-x64${{ github.event_name == 'workflow_dispatch' && format('-v{0}', inputs.version) || '' }}/libflutter_taglib_linux_x64.so
            dist/android-binaries${{ github.event_name == 'workflow_dispatch' && format('-v{0}', inputs.version) || '' }}/libflutter_taglib_android_arm64-v8a.so
            dist/android-binaries${{ github.event_name == 'workflow_dispatch' && format('-v{0}', inputs.version) || '' }}/libflutter_taglib_android_armeabi-v7a.so
            dist/android-binaries${{ github.event_name == 'workflow_dispatch' && format('-v{0}', inputs.version) || '' }}/libflutter_taglib_android_x86_64.so
