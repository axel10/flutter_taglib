name: flutter_taglib
description: "A high-performance Flutter plugin wrapping TagLib using Dart FFI and Native Assets to read/write audio metadata and properties."
version: 1.0.0
homepage: https://github.com/axel10/flutter_taglib
repository: https://github.com/axel10/flutter_taglib
issue_tracker: https://github.com/axel10/flutter_taglib/issues
topics:
  - audio
  - metadata
  - ffi
  - native-assets
  - taglib

environment:
  sdk: ^3.12.0
  flutter: ">=3.38.0"

dependencies:
  code_assets: ^1.0.0
  ffi: ^2.1.4
  hooks: ^1.0.0
  logging: ^1.3.0
  native_toolchain_c: ^0.17.4
  flutter:
    sdk: flutter

dev_dependencies:
  ffigen: ^20.1.1
  flutter_lints: ^6.0.0
  test: ^1.28.0

flutter:
  plugin:
    platforms:
      android:
        package: com.axel10.flutter_taglib
        pluginClass: FlutterTaglibPlugin
      ios:
        pluginClass: FlutterTaglibPlugin
